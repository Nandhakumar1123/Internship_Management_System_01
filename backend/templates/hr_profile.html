<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Profile</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
body { background: linear-gradient(135deg,#f0f4f8,#d9e2ec); color:#333; display:flex; justify-content:center; align-items:center; height:100vh; }
.container { background:white; padding:40px; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); text-align:center; max-width:500px; }
.container h2 { color:#4e73df; margin-bottom:20px; }
.container p { font-size:18px; margin:10px 0; }
button { padding:10px 20px; border:none; border-radius:12px; cursor:pointer; background:#4e73df; color:white; font-weight:bold; margin-top:20px; }
button:hover { background:#2e59d9; }
</style>
</head>
<body>

<div class="container">
  <h2>HR Profile</h2>
  <p><strong>Name:</strong> <span id="name">Loading...</span></p>
  <p><strong>Email:</strong> <span id="email">Loading...</span></p>
  <p><strong>Contact:</strong> <span id="mobile">Loading...</span></p>
  <button onclick="location.href='/company_dashboard'">← Back to Dashboard</button>
</div>

<script>
  // Simulated database: HR data stored in localStorage
  // If not exists, create a sample HR data
  if(!localStorage.getItem('hrData')){
    const sampleHR = {
      name: "HR Manager",
      email: "hr@example.com",
      mobile: "9876543210"
    };
    localStorage.setItem('hrData', JSON.stringify(sampleHR));
  }

  // Fetch HR data from localStorage
  const hrData = JSON.parse(localStorage.getItem('hrData'));

  document.getElementById('name').textContent = hrData.name;
  document.getElementById('email').textContent = hrData.email;
  document.getElementById('mobile').textContent = hrData.mobile;
</script>

</body>
</html>
