<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Dashboard</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Arial', sans-serif; }
body { background: linear-gradient(135deg, #f0f4f8, #d9e2ec); color:#333; }

/* Header */
header {
  background: linear-gradient(135deg,#4e73df,#1cc88a);
  color:white;
  padding:20px 40px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content: space-between;
  align-items: center;
}
header h1 { font-size:2em; letter-spacing:1px; }

/* Dropdown Menu */
.dropdown {
  position: relative;
  display: inline-block;
}
.dropbtn {
  background: linear-gradient(45deg,#4e73df,#1cc88a);
  color: white;
  padding: 10px 20px;
  border-radius: 12px;
  font-weight: bold;
  border: none;
  cursor: pointer;
}
.dropdown-content {
  display: none;
  position: absolute;
  right: 0;
  background-color: #f1f1f1;
  min-width: 160px;
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  border-radius: 12px;
  z-index: 1;
}
.dropdown-content a {
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  border-bottom: 1px solid #ddd;
}
.dropdown-content a:last-child { border-bottom: none; }
.dropdown-content a:hover { background-color: #ddd; }
.dropdown:hover .dropdown-content { display: block; }

/* Container */
.container {
  max-width:700px;
  margin:50px auto;
  background:white;
  padding:40px 30px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
  transition: transform 0.3s;
}
.container:hover { transform: translateY(-5px); }
.container h2 { font-size:2em; color:#4e73df; margin-bottom:30px; }

/* Buttons */
button.main-btn {
  padding:15px 35px;
  margin:15px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background: linear-gradient(45deg,#4e73df,#1cc88a);
  color:white;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition: all 0.3s ease;
}
button.main-btn:hover {
  background: linear-gradient(45deg,#1cc88a,#4e73df);
  transform: translateY(-3px) scale(1.05);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* Footer */
footer {
  background:#4e73df;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:50px;
  font-size:0.9em;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
}
footer a { color:#ffd700; text-decoration:none; margin:0 10px; }
footer a:hover { text-decoration:underline; }

/* Responsive */
@media (max-width: 768px) {
  .container { margin:20px; padding:30px 20px; }
  button.main-btn { width:80%; font-size:16px; }
}
</style>
</head>
<body>

<header>
  <h1>HR Dashboard</h1>
  <div class="dropdown">
    <button class="dropbtn" id="hrName">HR</button>
    <div class="dropdown-content">
      <a href="/hr_profile">Profile</a>
      <a href="/logout">Logout</a>
    </div>
  </div>
</header>

<div class="container">
  <h2>Welcome, <span id="welcomeName">HR</span>!</h2>
  <button class="main-btn" onclick="location.href='/company_post_internship'">Post New Internship</button>
  <button class="main-btn" onclick="location.href='/company_view_internships'">View Posted Internships</button>
</div>

<footer>
  &copy; 2025 Internship Portal | Designed by Your Institute |
  <a href="#">Contact</a> | <a href="#">Privacy Policy</a>
</footer>

<script>
const hrName = "HR Manager"; // Replace dynamically if needed
document.getElementById('hrName').textContent = hrName;
document.getElementById('welcomeName').textContent = hrName;
</script>

</body>
</html>
