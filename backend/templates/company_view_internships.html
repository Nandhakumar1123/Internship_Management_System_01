<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Posted Internships</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body {background: linear-gradient(135deg, #f0f4f8, #d9e2ec); color:#333;}
header {background: linear-gradient(135deg,#4e73df,#1cc88a); color:white; padding:20px 40px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,0.2);}
header h1 {font-size:2em;}
.container {max-width:1200px; margin:40px auto; padding:30px; background:white; border-radius:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1);}
table {width:100%; border-collapse:collapse; margin-bottom:20px;}
th, td {border:1px solid #ccc; padding:12px; text-align:left;}
th {background: linear-gradient(135deg,#4e73df,#1cc88a); color:white;}
td {background:#f8f9fc;}
button {padding:8px 15px; border:none; border-radius:8px; cursor:pointer; background:linear-gradient(45deg,#4e73df,#1cc88a); color:white; font-weight:bold; margin:3px;}
button:hover {background:linear-gradient(45deg,#1cc88a,#4e73df); transform:scale(1.05);}
.select-btn {background:green;}
.reject-btn {background:red;}
.status-Pending {color:orange; font-weight:bold;}
.status-Selected {color:green; font-weight:bold;}
.status-Rejected {color:red; font-weight:bold;}
.loading {text-align:center; padding:20px;}
.modal {display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);}
.modal-content {background:white; margin:5% auto; padding:30px; width:90%; max-width:900px; border-radius:20px; max-height:80vh; overflow-y:auto;}
.close {float:right; font-size:28px; font-weight:bold; cursor:pointer;}
</style>
</head>
<body>

<header>
  <h1>Posted Internships</h1>
</header>

<div class="container">
  <div id="loadingMessage" class="loading">Loading internships...</div>
  <table id="internshipTable" style="display:none;">
    <tr><th>Title</th><th>Skills</th><th>Stipend</th><th>Applications</th><th>Action</th></tr>
  </table>
  <button onclick="location.href='/company_dashboard'">← Back to Dashboard</button>
</div>

<div id="applicantsModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h2 id="modalTitle">Applicants</h2>
    <table id="applicantsTable">
      <tr><th>Student Name</th><th>Email</th><th>Mobile</th><th>Skills</th><th>Status</th><th>Actions</th></tr>
    </table>
  </div>
</div>

<script>
let currentUser = null;

function checkAuth() {
  currentUser = JSON.parse(localStorage.getItem('currentUser'));
  if (!currentUser || currentUser.role !== 'company') {
    window.location.href = '/login';
    return false;
  }
  return true;
}

async function loadInternships() {
  try {
    const response = await fetch(`/api/company/internships/${currentUser.user_id}`);
    const data = await response.json();
    
    if (data.success) {
      displayInternships(data.internships);
    }
  } catch (error) {
    console.error('Error loading internships:', error);
  }
}

function displayInternships(internships) {
  document.getElementById('loadingMessage').style.display = 'none';
  const table = document.getElementById('internshipTable');
  table.style.display = 'table';
  
  while (table.rows.length > 1) {
    table.deleteRow(1);
  }
  
  internships.forEach(internship => {
    const row = table.insertRow();
    row.insertCell(0).innerText = internship.title;
    row.insertCell(1).innerText = internship.skills_required;
    row.insertCell(2).innerText = internship.stipend || 'Not specified';
    row.insertCell(3).innerText = internship.total_applications || 0;
    
    const btn = document.createElement('button');
    btn.innerText = 'View Applicants';
    btn.onclick = () => viewApplicants(internship.internship_id, internship.title);
    row.insertCell(4).appendChild(btn);
  });
}

async function viewApplicants(internshipId, title) {
  try {
    const response = await fetch(`/api/internship/${internshipId}/applications`);
    const data = await response.json();
    
    if (data.success) {
      displayApplicants(data.applications, title);
    }
  } catch (error) {
    console.error('Error loading applicants:', error);
  }
}

function displayApplicants(applicants, title) {
  document.getElementById('modalTitle').textContent = `Applicants for "${title}"`;
  const table = document.getElementById('applicantsTable');
  
  while (table.rows.length > 1) {
    table.deleteRow(1);
  }
  
  if (applicants.length === 0) {
    const row = table.insertRow();
    const cell = row.insertCell(0);
    cell.colSpan = 6;
    cell.innerText = 'No applicants yet';
    cell.style.textAlign = 'center';
  } else {
    applicants.forEach(app => {
      const row = table.insertRow();
      row.insertCell(0).innerText = app.student_name;
      row.insertCell(1).innerText = app.student_email;
      row.insertCell(2).innerText = app.student_mobile || 'N/A';
      row.insertCell(3).innerText = app.student_skills || 'N/A';
      
      const statusCell = row.insertCell(4);
      statusCell.innerText = app.status;
      statusCell.className = `status-${app.status}`;
      
      const actionsCell = row.insertCell(5);
      
      const selectBtn = document.createElement('button');
      selectBtn.innerText = 'Select';
      selectBtn.className = 'select-btn';
      selectBtn.onclick = () => updateStatus(app.application_id, 'Selected', row);
      
      const rejectBtn = document.createElement('button');
      rejectBtn.innerText = 'Reject';
      rejectBtn.className = 'reject-btn';
      rejectBtn.onclick = () => updateStatus(app.application_id, 'Rejected', row);
      
      actionsCell.appendChild(selectBtn);
      actionsCell.appendChild(rejectBtn);
    });
  }
  
  document.getElementById('applicantsModal').style.display = 'block';
}

async function updateStatus(applicationId, status, row) {
  try {
    const formData = new FormData();
    formData.append('status', status);
    
    const response = await fetch(`/api/applications/${applicationId}/status`, {
      method: 'PUT',
      body: formData
    });
    
    const data = await response.json();
    
    if (data.success) {
      const statusCell = row.cells[4];
      statusCell.innerText = status;
      statusCell.className = `status-${status}`;
      alert(`Application ${status.toLowerCase()} successfully`);
    }
  } catch (error) {
    console.error('Error updating status:', error);
    alert('Failed to update status');
  }
}

document.querySelector('.close').onclick = function() {
  document.getElementById('applicantsModal').style.display = 'none';
}

window.onclick = function(event) {
  const modal = document.getElementById('applicantsModal');
  if (event.target == modal) {
    modal.style.display = 'none';
  }
}

if (checkAuth()) {
  loadInternships();
}
</script>

</body>
</html>
